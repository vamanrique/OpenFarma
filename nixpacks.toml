# OpenFarma — Build config for Railway (nixpacks)
# frontend/dist/ is committed — no Node.js needed at build time
[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  "/opt/venv/bin/pip install -r backend/requirements.txt"
]

[start]
cmd = "bash /app/backend/start.sh"
